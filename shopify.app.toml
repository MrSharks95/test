# Shopify app configuration — pushed via `shopify app deploy`.
client_id = "2e9c790c9a84cee29d3e804fc75d2b57"
name = "EU Withdrawal"
application_url = "https://test-mrsharks95s-projects.vercel.app"
embedded = true

[access_scopes]
# Long withdrawal periods may need read_all_orders (orders > 60 days) — confirm
# in the Partner docs before submission.
scopes = "read_orders,write_orders,read_customers"
# Use the classic OAuth grant flow (/api/auth -> /api/auth/callback) that this
# app implements, instead of Shopify managed installation (token exchange).
use_legacy_install_flow = true

[auth]
redirect_urls = [ "https://test-mrsharks95s-projects.vercel.app/api/auth/callback" ]

[app_proxy]
url = "https://test-mrsharks95s-projects.vercel.app/api/proxy"
subpath = "retractation"
prefix = "apps"

[webhooks]
api_version = "2024-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://test-mrsharks95s-projects.vercel.app/api/webhooks"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://test-mrsharks95s-projects.vercel.app/api/webhooks"
  customer_deletion_url = "https://test-mrsharks95s-projects.vercel.app/api/webhooks"
  shop_deletion_url = "https://test-mrsharks95s-projects.vercel.app/api/webhooks"
